# Safety CLI v3 Policy File
# Generated with: safety generate policy_file
# Validated with: safety validate policy_file
# Docs: https://docs.safetycli.com
version: '3.0'

scanning-settings:
  # Maximum directory depth to scan (default: 6)
  max-depth: 6
  # Paths to exclude from scanning (glob patterns)
  exclude: []
  # Specific files to always include even if excluded
  include-files: []
  system:
    # Additional system-level scan targets
    targets: []

report:
  dependency-vulnerabilities:
    enabled: true
    auto-ignore-in-report:
      python:
        # Suppress results from the active virtual environment itself
        environment-results: true
        # Suppress packages without pinned versions
        unpinned-requirements: true
      # CVSS severity levels to auto-suppress in the report (e.g. [low, info])
      cvss-severity: []

fail-scan-with-exit-code:
  dependency-vulnerabilities:
    # Exit with code 64 when vulnerabilities exceed thresholds
    enabled: true
    fail-on-any-of:
      cvss-severity:
        - critical
        - high
        - medium
      exploitability:
        - critical
        - high
        - medium

security-updates:
  dependency-vulnerabilities:
    # Only auto-apply patch-level version bumps via --apply-fixes
    auto-security-updates-limit:
      - patch

installation:
  # Default action for packages not explicitly listed: allow or deny
  default-action: allow
  audit-logging:
    # Log all installation events to Safety Platform
    enabled: true
  allow:
    # Explicitly allowed packages (override deny rules)
    packages: []
    # Explicitly allowed vulnerability IDs with documented reasons:
    # vulnerabilities:
    #   CVE-2024-12345:
    #     reason: "False positive — only affects Windows builds"
    #     expires: "2025-01-01"
    vulnerabilities: {}
  deny:
    # Packages that must never be installed
    packages: {}
    vulnerabilities:
      # Warn (but don't block) for these CVSS severity levels
      warning-on-any-of:
        cvss-severity: []
      # Block installation for these CVSS severity levels
      block-on-any-of:
        cvss-severity: []
