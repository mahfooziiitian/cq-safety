name: CI v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Lint & validate ─────────────────────────────────────────────────────────
  validate:
    name: Validate Config & Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build MkDocs (strict)
        run: uv run mkdocs build --strict

  # ── Security scan ───────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Safety check
        run: |
          uv run safety check \
            --key "$SAFETY_API_KEY" \
            -r requirements.txt \
            --json > reports/safety-report.json
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-reports
          path: reports/
          retention-days: 30

  # ── Matrix: multiple Python versions ────────────────────────────────────────
  compatibility:
    name: Python ${{ matrix.python-version }} compatibility
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Verify Safety CLI runs
        run: uv run safety --version

  # ── Summary gate ────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [validate, security, compatibility]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.validate.result }}"      != "success" ||
                "${{ needs.security.result }}"      != "success" ||
                "${{ needs.compatibility.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
