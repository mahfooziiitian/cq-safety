name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - "**.txt"
      - "**.toml"
      - "**.cfg"
      - "uv.lock"
      - ".safety-policy.yml"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.txt"
      - "**.toml"
      - "**.cfg"
      - "uv.lock"
      - ".safety-policy.yml"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC — catch newly published CVEs
  workflow_dispatch:       # Allow manual runs from the Actions tab


permissions:
  contents: read

jobs:
  safety-scan:
    name: Safety Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Safety check
        id: safety
        run: |
          uv run safety check \
            --key "$SAFETY_API_KEY" \
            -r requirements.txt \
            --policy-file .safety-policy.yml \
            --full-report
          uv run safety check \
            --key "$SAFETY_API_KEY" \
            -r requirements.txt \
            --json > reports/safety-report.json
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

      - name: Upload scan reports
        if: always()   # upload even when vulnerabilities are found
        uses: actions/upload-artifact@v4
        with:
          name: safety-reports-${{ github.run_number }}
          path: reports/
          retention-days: 90

      - name: Annotate PR with vulnerability summary
        if: failure() && github.event_name == 'pull_request'
        run: |
          echo "## ❌ Safety Vulnerability Scan Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more vulnerabilities were detected that exceed the policy threshold." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Review the uploaded \`safety-reports\` artifact for details.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To investigate:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "safety check --full-report -r requirements.txt" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Write success summary
        if: success()
        run: |
          echo "## ✅ Safety Vulnerability Scan Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No vulnerabilities found above the policy threshold." >> $GITHUB_STEP_SUMMARY
